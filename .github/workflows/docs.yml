name: Documentation

# Builds the Sphinx site in docs/ and publishes it to GitHub Pages.
# The site is rebuilt on every push to main that touches the course materials,
# and can be triggered by hand from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "Lab_Notebooks/**"
      - "Lecture_Slides/**/*.pdf"
      - "Mock_Exams/**/*.pdf"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deployment finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt

      # -W turns warnings into errors: a broken reference fails the build
      # rather than silently shipping a broken page.
      - name: Build the site
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

      # Belt and braces: Pages does not run Jekyll on artifact deploys, but
      # this guarantees the _static/ directory is never stripped.
      - name: Disable Jekyll
        run: touch docs/_build/html/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
